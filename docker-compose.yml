services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: neurobars_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - neuro_network

  web:
    build: .
    container_name: neurobars_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - qdrant
    networks:
      - neuro_network

networks:
  neuro_network:
    driver: bridge